<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Incendios Forestales - GVA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --fire-red: #dc3545;
            --water-blue: #0d6efd;
            --success-green: #198754;
        }
        
        #map { 
            height: 500px; 
            width: 100%; 
            border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .navbar-brand {
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        
        .card {
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .card-body {
            padding: 1.5rem;
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
        }
        
        .alert {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1050;
            min-width: 300px;
        }
        
        .alert.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .stats-card {
            text-align: center;
            padding: 1rem;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 0.5rem;
        }
        
        .stats-card.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .stats-card.available {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .stats-number {
            font-size: 2rem;
            font-weight: bold;
        }
        
        .stats-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        .form-group label {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-danger mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">🚒 Panel de Control de Incendios - Comunitat Valenciana</span>
        </div>
    </nav>

    <!-- Notifications -->
    <div id="alertContainer"></div>

    <div class="container-fluid">
        <!-- Statistics -->
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title mb-3">📊 Estadísticas en Tiempo Real</h5>
                        <div id="statsContainer" class="row">
                            <div class="col text-center">
                                <div class="loading"></div> Cargando...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="row">
            <div class="col-md-4">
                <div class="card mb-3">
                    <div class="card-body">
                        <h5 class="card-title">📝 Notificar Incendio</h5>
                        <form id="incendioForm">
                            <div class="mb-3">
                                <label for="incUbi" class="form-label">Municipio</label>
                                <input type="text" id="incUbi" class="form-control" placeholder="ej: Valencia" required>
                            </div>
                            <div class="mb-3">
                                <label for="incNivel" class="form-label">Nivel (1-3)</label>
                                <select id="incNivel" class="form-control" required>
                                    <option value="">Seleccionar nivel</option>
                                    <option value="1">1 - Bajo</option>
                                    <option value="2">2 - Medio</option>
                                    <option value="3">3 - Alto</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="incLat" class="form-label">Latitud</label>
                                <input type="number" step="any" id="incLat" class="form-control" placeholder="39.4699" required>
                            </div>
                            <div class="mb-3">
                                <label for="incLng" class="form-label">Longitud</label>
                                <input type="number" step="any" id="incLng" class="form-control" placeholder="-0.3763" required>
                            </div>
                            <button type="submit" class="btn btn-danger w-100">
                                <span id="formBtn">🔴 Registrar Foco</span>
                            </button>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">🗺️ Filtros</h5>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="filterFires" checked>
                            <label class="form-check-label" for="filterFires">
                                Mostrar Incendios
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="filterResources" checked>
                            <label class="form-check-label" for="filterResources">
                                Mostrar Recursos
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">🌍 Mapa de Situación en Tiempo Real</h5>
                        <div id="map"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // API Configuration
        const API_BASE = 'http://localhost:5000/api';
        
        // Markers storage
        let markers = {
            fires: [],
            resources: []
        };
        
        // Initialize map
        const map = L.map('map').setView([39.48, -0.75], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);
        
        // Custom markers
        const fireIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });
        
        const resourceIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });
        
        // Show alert notification
        function showAlert(message, type = 'success') {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            alertContainer.appendChild(alertDiv);
            alertDiv.classList.add('show');
            
            setTimeout(() => {
                alertDiv.remove();
            }, 4000);
        }
        
        // Load statistics
        async function cargarEstadisticas() {
            try {
                const res = await fetch(`${API_BASE}/estadisticas`);
                if (!res.ok) throw new Error('Failed to load statistics');
                
                const data = await res.json();
                const statsContainer = document.getElementById('statsContainer');
                
                statsContainer.innerHTML = `
                    <div class="col-lg-2 col-md-4 col-6">
                        <div class="stats-card active">
                            <div class="stats-number">${data.incendios.activos}</div>
                            <div class="stats-label">Incendios Activos</div>
                        </div>
                    </div>
                    <div class="col-lg-2 col-md-4 col-6">
                        <div class="stats-card">
                            <div class="stats-number">${data.incendios.total}</div>
                            <div class="stats-label">Incendios Totales</div>
                        </div>
                    </div>
                    <div class="col-lg-2 col-md-4 col-6">
                        <div class="stats-card available">
                            <div class="stats-number">${data.recursos.disponibles}</div>
                            <div class="stats-label">Recursos Disponibles</div>
                        </div>
                    </div>
                    <div class="col-lg-2 col-md-4 col-6">
                        <div class="stats-card">
                            <div class="stats-number">${data.recursos.en_mision}</div>
                            <div class="stats-label">En Misión</div>
                        </div>
                    </div>
                    <div class="col-lg-2 col-md-4 col-6">
                        <div class="stats-card">
                            <div class="stats-number">${data.incendios.controlados}</div>
                            <div class="stats-label">Controlados</div>
                        </div>
                    </div>
                    <div class="col-lg-2 col-md-4 col-6">
                        <div class="stats-card">
                            <div class="stats-number">${data.incendios.extinguidos}</div>
                            <div class="stats-label">Extinguidos</div>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading statistics:', error);
            }
        }
        
        // Load map data
        async function cargarMapa() {
            try {
                // Clear existing markers
                markers.fires.forEach(m => map.removeLayer(m));
                markers.resources.forEach(m => map.removeLayer(m));
                markers = { fires: [], resources: [] };
                
                // Load fires
                if (document.getElementById('filterFires').checked) {
                    const resInc = await fetch(`${API_BASE}/incendios`);
                    if (resInc.ok) {
                        const incendios = await resInc.json();
                        incendios.forEach(inc => {
                            const marker = L.marker([inc.lat, inc.lng], { icon: fireIcon })
                                .addTo(map)
                                .bindPopup(`
                                    <b>🔥 INCENDIO</b><br>
                                    <strong>${inc.ubicacion}</strong><br>
                                    Nivel: ${getNivelBadge(inc.nivel)}<br>
                                    Estado: ${inc.estado}<br>
                                    <small>${new Date(inc.created_at).toLocaleString('es-ES')}</small>
                                `);
                            markers.fires.push(marker);
                        });
                    }
                }
                
                // Load resources
                if (document.getElementById('filterResources').checked) {
                    const resRec = await fetch(`${API_BASE}/recursos`);
                    if (resRec.ok) {
                        const recursos = await resRec.json();
                        recursos.forEach(rec => {
                            const marker = L.marker([rec.lat, rec.lng], { icon: resourceIcon })
                                .addTo(map)
                                .bindPopup(`
                                    <b>🚒 RECURSO</b><br>
                                    <strong>${rec.nombre}</strong><br>
                                    Tipo: ${rec.tipo}<br>
                                    Estado: ${rec.estado}<br>
                                    Capacidad: ${rec.capacidad || 'N/A'}
                                `);
                            markers.resources.push(marker);
                        });
                    }
                }
            } catch (error) {
                console.error('Error loading map:', error);
                showAlert('Error al cargar el mapa', 'danger');
            }
        }
        
        // Get level badge
        function getNivelBadge(nivel) {
            const badges = {
                1: '<span class="badge bg-warning">Bajo</span>',
                2: '<span class="badge bg-danger">Medio</span>',
                3: '<span class="badge bg-dark">Alto</span>'
            };
            return badges[nivel] || 'Desconocido';
        }
        
        // Handle form submission
        document.getElementById('incendioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('formBtn');
            btn.innerHTML = '<span class="loading"></span> Registrando...';
            
            try {
                const nuevoInc = {
                    ubicacion: document.getElementById('incUbi').value,
                    nivel: parseInt(document.getElementById('incNivel').value),
                    lat: parseFloat(document.getElementById('incLat').value),
                    lng: parseFloat(document.getElementById('incLng').value),
                    estado: 'Activo'
                };
                
                const res = await fetch(`${API_BASE}/incendios`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(nuevoInc)
                });
                
                if (res.ok) {
                    showAlert('✓ Incendio registrado exitosamente', 'success');
                    document.getElementById('incendioForm').reset();
                    await cargarMapa();
                    await cargarEstadisticas();
                } else {
                    const error = await res.json();
                    showAlert('✗ Error: ' + (error.error || 'No se pudo registrar'), 'danger');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('✗ Error de conexión con el servidor', 'danger');
            } finally {
                btn.innerHTML = '🔴 Registrar Foco';
            }
        });
        
        // Filter changes
        document.getElementById('filterFires').addEventListener('change', cargarMapa);
        document.getElementById('filterResources').addEventListener('change', cargarMapa);
        
        // Load data on page load
        cargarEstadisticas();
        cargarMapa();
        
        // Refresh data every 10 seconds
        setInterval(() => {
            cargarMapa();
            cargarEstadisticas();
        }, 10000);
    </script>
</body>
</html>
